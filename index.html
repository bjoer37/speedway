<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildgalleri</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#333;
color:white;
padding:20px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.thumb{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
cursor:pointer;
}

.thumb img{
width:100%;
border-radius:5px;
}

.thumb p{
font-size:14px;
margin-top:8px;
}

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

.viewer img{
max-width:90%;
max-height:80%;
cursor:grab;
transition:transform 0.15s;
}

.viewer p{
color:white;
margin-top:15px;
font-size:18px;
text-align:center;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

.nav{
position:absolute;
top:50%;
font-size:50px;
color:white;
cursor:pointer;
user-select:none;
}

.prev{
left:30px;
}

.next{
right:30px;
}

</style>
</head>

<body>

<header>
<h1>Mitt Bildprojekt</h1>
<p>Klicka på en bild</p>
</header>

<div class="gallery">

<div class="thumb" onclick="openViewer(0)">
<img src="images/thumbs/28-1_t.jpeg">
<p>Beskrivning av bild 1</p>
</div>

<div class="thumb" onclick="openViewer(1)">
<img src="images/thumbs/28-1_t.jpeg.jpg">
<p>Beskrivning av bild 2</p>
</div>

<div class="thumb" onclick="openViewer(2)">
<img src="images/thumbs/28-1_t.jpeg">
<p>Beskrivning av bild 3</p>
</div>

</div>


<div class="viewer" id="viewer">

<span class="close" onclick="closeViewer()">×</span>

<div class="nav prev" onclick="prevImage()">❮</div>
<div class="nav next" onclick="nextImage()">❯</div>

<img id="viewerImg">
<p id="viewerText"></p>

</div>


<script>

const images = [
{src:"images/28-1.jpeg",text:"Beskrivning av bild 1"},
{src:"images/28-2.jpeg",text:"Beskrivning av bild 2"},
{src:"images/28-3.jpeg",text:"Beskrivning av bild 3"}
];

let current = 0;
let scale = 1;
let posX = 0;
let posY = 0;
let dragging=false;
let startX,startY;

const viewer=document.getElementById("viewer");
const img=document.getElementById("viewerImg");
const text=document.getElementById("viewerText");


function openViewer(i){

current=i;

viewer.style.display="flex";

img.src=images[i].src;
text.innerText=images[i].text;

resetZoom();

}


function closeViewer(){

viewer.style.display="none";

}


function nextImage(){

current++;

if(current>=images.length) current=0;

openViewer(current);

}


function prevImage(){

current--;

if(current<0) current=images.length-1;

openViewer(current);

}


function resetZoom(){

scale=1;
posX=0;
posY=0;
updateTransform();

}


function updateTransform(){

img.style.transform=
`translate(${posX}px,${posY}px) scale(${scale})`;

}


// scroll zoom

img.addEventListener("wheel",(e)=>{

e.preventDefault();

if(e.deltaY<0) scale+=0.15;
else scale-=0.15;

if(scale<1) scale=1;
if(scale>6) scale=6;

updateTransform();

});


// drag

img.addEventListener("mousedown",(e)=>{

dragging=true;

startX=e.clientX-posX;
startY=e.clientY-posY;

img.style.cursor="grabbing";

});

window.addEventListener("mouseup",()=>{

dragging=false;
img.style.cursor="grab";

});

window.addEventListener("mousemove",(e)=>{

if(!dragging) return;

posX=e.clientX-startX;
posY=e.clientY-startY;

updateTransform();

});


// keyboard navigation

document.addEventListener("keydown",(e)=>{

if(viewer.style.display!="flex") return;

if(e.key==="ArrowRight") nextImage();
if(e.key==="ArrowLeft") prevImage();
if(e.key==="Escape") closeViewer();

});

</script>

</body>
</html>
