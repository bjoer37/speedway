<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildgalleri</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    padding:20px;
    text-align:center;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:15px;
    padding:20px;
}

.thumb{
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
    cursor:pointer;
}

.thumb img{
    width:100%;
    border-radius:5px;
}

.thumb p{
    font-size:14px;
    margin-top:8px;
    color:#333;
}

/* viewer */

.viewer{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.viewer img{
    max-width:90%;
    max-height:90%;
    cursor:grab;
    transition:transform 0.1s;
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    font-size:40px;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Mitt Bildprojekt</h1>
<p>Klicka på en bild för att öppna</p>
</header>

<div class="gallery">

<div class="thumb" onclick="openViewer('images/28-1.jpeg')">
<img src="images/thumbs/28-1_t.jpeg">
<p>28 – motto</p>
</div>

<div class="thumb" onclick="openViewer('images/28-2.jpeg')">
<img src="images/thumbs/28-1_t.jpeg">
<p>Cylinder</p>
</div>

<div class="thumb" onclick="openViewer('images/28-3.jpeg')">
<img src="images/thumbs/28-1_t.jpeg">
<p>Apa</p>
</div>

</div>

<div class="viewer" id="viewer">

<span class="close" onclick="closeViewer()">×</span>
<img id="viewerImg">

</div>

<script>

const viewer = document.getElementById("viewer")
const img = document.getElementById("viewerImg")

let scale = 1
let posX = 0
let posY = 0
let startX
let startY
let dragging = false

function updateTransform(){
    img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`
}

function openViewer(src){
    viewer.style.display="flex"
    img.src = src
    scale = 1
    posX = 0
    posY = 0
    updateTransform()
}

function closeViewer(){
    viewer.style.display="none"
}

// scroll zoom kring muspekaren
img.addEventListener("wheel", function(e){
    e.preventDefault();

    // koordinater för muspekaren relativt bilden
    const rect = img.getBoundingClientRect();
    const offsetX = e.clientX - rect.left;
    const offsetY = e.clientY - rect.top;

    const prevScale = scale;

    // ändra skala
    if(e.deltaY < 0) scale += 0.15;
    else scale -= 0.15;

    if(scale < 1) scale = 1;
    if(scale > 6) scale = 6;

    // räkna zoom kring muspekaren
    posX -= (offsetX - posX) * (scale/prevScale - 1);
    posY -= (offsetY - posY) * (scale/prevScale - 1);

    updateTransform();
});

// dubbelklick zoom
img.addEventListener("dblclick", function(){
    if(scale === 1){
        scale = 2.5
    }else{
        scale = 1
        posX = 0
        posY = 0
    }
    updateTransform()
})

// panorering start
img.addEventListener("mousedown", function(e){
    if(scale === 1) return
    dragging = true
    startX = e.clientX - posX
    startY = e.clientY - posY
    img.style.cursor="grabbing"
})

// panorering rörelse
window.addEventListener("mousemove", function(e){
    if(!dragging) return
    posX = e.clientX - startX
    posY = e.clientY - startY
    updateTransform()
})

// panorering slut
window.addEventListener("mouseup", function(){
    dragging = false
    img.style.cursor="grab"
})

// klick utanför stänger
viewer.addEventListener("click", function(e){
    if(e.target === viewer){
        closeViewer()
    }
})

</script>

</body>
</html>
